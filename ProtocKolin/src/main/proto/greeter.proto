syntax = "proto3";

package greeter;

option java_package = "com.example";
option java_outer_classname = "GreeterProto";

// REMOVE this line
// import "google/protobuf/kotlin_options.proto";
// REMOVE this line
// option (google.protobuf.kotlin_package) = "com.example";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
